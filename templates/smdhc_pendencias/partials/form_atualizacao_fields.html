<div class="row g-3">
  <div class="col-md-4">
    <label class="form-label fw-semibold">Tipo de atualização</label>
    <select name="tema_atualizacao_tipo" class="form-select" data-atualizacao-tipo-select>
      {% for tipo in atualizacao_tipos %}
        <option value="{{ tipo }}" {% if tipo == 'Outros' %}selected{% endif %}>{{ tipo }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label fw-semibold">Data</label>
    <input type="date" name="tema_atualizacao_data" class="form-control">
  </div>
  <div class="col-12">
    <label class="form-label fw-semibold">Atualização</label>
    <textarea name="tema_atualizacao" class="form-control" rows="4" required placeholder="Descreva o andamento mais recente"></textarea>
  </div>
  <div class="col-12">
    <label class="form-label fw-semibold">Próxima ação</label>
    <textarea
      name="tema_acao_subsequente"
      class="form-control"
      rows="4"
      placeholder="Qual é o próximo passo esperado?"
    ></textarea>
  </div>
</div>

<div class="meeting-participants-shell mt-4 d-none" data-reuniao-fields>
  <div class="meeting-participants-header">
    <div>
      <div class="fw-semibold">Participantes da reunião</div>
      <div class="small text-muted">Você pode combinar usuários do sistema com participantes externos.</div>
    </div>
    <span class="badge bg-light text-dark border">Somente para tipo Reunião</span>
  </div>

  <div class="row g-3 mt-1">
    <div class="col-lg-7">
      <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-2">
        <label class="form-label fw-semibold mb-0">Usuários do sistema</label>
        <small class="text-muted">Seleção múltipla</small>
      </div>
      <div class="people-chip-search mb-2">
        <input
          type="text"
          class="form-control"
          placeholder="Filtrar participantes internos"
          data-participante-search
        >
      </div>
      <div class="people-chip-grid" data-participante-grid>
        {% for usuario in usuarios_options %}
          <label
            class="people-chip"
            data-usuario-id="{{ usuario.usuario_id }}"
            data-usuario-label="{{ (usuario.usuario_nome ~ ' ' ~ (usuario.usuario_setor or '') ~ ' ' ~ (usuario.usuario_email or ''))|lower }}"
          >
            <input
              class="form-check-input"
              type="checkbox"
              name="participante_usuario_ids"
              value="{{ usuario.usuario_id }}"
            >
            <span>
              <strong>{{ usuario.usuario_nome }}</strong>
              <small>
                {{ usuario.usuario_setor or 'Setor não informado' }}
                {% if usuario.usuario_email %} · {{ usuario.usuario_email }}{% endif %}
              </small>
            </span>
          </label>
        {% endfor %}
      </div>
    </div>

    <div class="col-lg-5">
      <div class="meeting-external-box">
        <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
          <label class="form-label fw-semibold mb-0">Participantes externos</label>
          <button type="button" class="btn btn-sm btn-outline-primary" data-add-externo-row>
            <i class="bi bi-plus-circle me-1"></i> Adicionar
          </button>
        </div>

        <div class="meeting-external-list" data-externo-list></div>

        <template data-externo-template>
          <div class="meeting-external-row">
            <div class="row g-2 align-items-end">
              <div class="col-6">
                <label class="form-label external-participant-label mb-1">Nome</label>
                <input type="text" name="participante_externo_nome" class="form-control" placeholder="Nome do participante">
              </div>
              <div class="col-5">
                <label class="form-label external-participant-label mb-1">Setor</label>
                <input type="text" name="participante_externo_setor" class="form-control" placeholder="Setor / órgão">
              </div>
              <div class="col-1 d-grid">
                <button type="button" class="btn btn-outline-danger btn-sm" data-remove-externo-row title="Remover participante externo">
                  <i class="bi bi-x-lg"></i>
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>
